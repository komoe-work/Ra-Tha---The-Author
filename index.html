
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ra Tha - Modern Dhamma teachings and books for the IT and AI generation. Discover simple, mathematical insights into the mind, nature, and the concept of Zero.">
    <title>Ra Tha - The Author</title>
    
    <!-- Performance: Preconnect to font origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Performance: Preload critical fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Pyidaungsu&family=Noto+Sans+Myanmar:wght@400;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Pyidaungsu&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

    <script src="https://cdn.tailwindcss.com" defer></script>
    
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                'primary': '#8b5cf6',
                'secondary': '#d97706',
                'dark-bg': '#0f172a',
                'light-bg': '#f8fafc',
                'card-bg-dark': '#1e293b',
                'card-bg-light': '#ffffff',
              }
            }
          }
        };
      });
    </script>
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d97706;
        }
        body {
            font-family: 'Inter', 'Pyidaungsu', sans-serif;
            font-display: swap;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .app-card {
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .dark .app-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .light .app-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }

        .app-card:active {
            transform: scale(0.98);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        .mm-text {
            line-height: 1.8;
        }

        .active-nav-icon {
            color: var(--primary);
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.5));
        }
        
        .glass-header {
            transition: all 0.3s ease;
            backdrop-filter: blur(16px);
        }
        
        .dark .glass-header {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .light .glass-header {
            background: rgba(255, 255, 255, 0.85);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .dark body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        .light body {
            background-color: #f8fafc;
            color: #1e293b;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
<body class="dark">
    <div id="root"></div>
</body>
</html>
